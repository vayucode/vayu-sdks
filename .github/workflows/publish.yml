name: Version Bump & Publish

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'The type of version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  bump-version:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "Current version: $VERSION"
          IFS='.' read -r major minor patch <<< "$VERSION"

          OPERATION="${{ github.event.inputs.operation || 'patch' }}"
          case "$OPERATION" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac

          NEW_VERSION="$major.$minor.$patch"
          echo "New version: $NEW_VERSION"
          echo "$NEW_VERSION" > VERSION
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          git add VERSION
          git commit -m "Release v${{ steps.bump.outputs.new_version }}"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin main
          git push origin "v${{ steps.bump.outputs.new_version }}"

  publish-typescript:
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: https://registry.npmjs.org/

      - name: Update package.json version
        working-directory: typescript
        run: npm version ${{ needs.bump-version.outputs.new_version }} --no-git-tag-version

      - name: Install and build
        working-directory: typescript
        run: |
          npm ci
          npm run build

      - name: Publish to npm
        working-directory: typescript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-python:
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Update version
        working-directory: python
        run: |
          sed -i "s/__version__ = .*/__version__ = \"${{ needs.bump-version.outputs.new_version }}\"/" vayu_sdk/__init__.py

      - name: Install dependencies
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install build twine

      - name: Build
        working-directory: python
        run: python setup.py sdist bdist_wheel

      - name: Publish to PyPI
        working-directory: python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*

  publish-go:
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read supported Go versions
        id: versions
        run: |
          VERSIONS=$(grep -v '^[[:space:]]*$' go/version_support/supported_versions.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | tr '\n' ' ')
          echo "go_versions=$VERSIONS" >> "$GITHUB_OUTPUT"

      - name: Create Go module tags
        run: |
          VERSION="${{ needs.bump-version.outputs.new_version }}"

          # Create the main Go subdirectory tag
          git tag "go/v${VERSION}"
          git push origin "go/v${VERSION}"

          # Create per-Go-version tags for compatibility
          for GO_VERSION in ${{ steps.versions.outputs.go_versions }}; do
            echo "Creating tag go/v${VERSION}-go${GO_VERSION}"
            git tag "go/v${VERSION}-go${GO_VERSION}"
            git push origin "go/v${VERSION}-go${GO_VERSION}"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          VERSION="${{ needs.bump-version.outputs.new_version }}"
          BODY="Release v${VERSION}"$'\n\n'"### SDKs"$'\n'
          BODY+="- **TypeScript:** [vayu-ts@${VERSION}](https://www.npmjs.com/package/vayu-ts/v/${VERSION})"$'\n'
          BODY+="- **Python:** [vayu-client ${VERSION}](https://pypi.org/project/vayu-client/${VERSION}/)"$'\n'
          BODY+="- **Go:** \`go get github.com/vayucode/vayu-sdks/go@go/v${VERSION}\`"$'\n'
          gh release create "v${VERSION}" --title "v${VERSION}" --notes "$BODY"
